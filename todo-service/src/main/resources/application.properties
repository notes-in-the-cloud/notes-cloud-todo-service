spring.application.name=todo-service
server.port=8085

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${POSTGRES_DB:notes_cloud}
spring.datasource.username=${POSTGRES_USER:notes_cloud_user}
spring.datasource.password=${POSTGRES_PASSWORD:notes_cloud_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true